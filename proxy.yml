---
  - name: Setup proxy
    hosts: proxies 
    gather_facts: no
    become: no

    tasks:
    - name: Lock RHEL release version to 9.6
      ansible.builtin.command:
        cmd: subscription-manager release --set=9.6
      register: release_lock
      changed_when: "'Release set to' in release_lock.stdout"

    - name: Installer .NET Runtime 8.0
      ansible.builtin.dnf:
        name: dotnet-runtime-8.0
        state: present

    - name: Ensure dnf-plugin-core (versionlock) is installed
      ansible.builtin.dnf:
        name: python3-dnf-plugin-versionlock
        state: present

    - name: Lock dotnet-runtime-8.0 version
      community.general.dnf_versionlock:
        name: dotnet-runtime-8.0
        state: present

    - name: Lock dotnet-sdk-8.0 version (if present)
      community.general.dnf_versionlock:
        name: dotnet-sdk-8.0
        state: present

    - name: Prevent accidental .NET updates via dnf.conf
      ansible.builtin.lineinfile:
        path: /etc/dnf/dnf.conf
        line: "exclude=dotnet*"
        regexp: "^exclude=dotnet"
        state: present

    - name: Install EPEL repository
      ansible.builtin.dnf:
        name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
        state: present
        disable_gpg_check: true

    # - name: Install Glances
    #   ansible.builtin.dnf:
    #     name: glances
    #     state: present


    - name: Download Zabbix release RPM
      get_url:
        url: https://repo.zabbix.com/zabbix/7.2/release/rhel/9/noarch/zabbix-release-7.2-1.el9.noarch.rpm
        dest: /tmp/zabbix-release.rpm
        mode: '0644'

    - name: Install Zabbix release RPM
      dnf:
        name: /tmp/zabbix-release.rpm
        state: present
        disable_gpg_check: true

    - name: Exclude zabbix packages from EPEL
      ansible.builtin.lineinfile:
        path: /etc/yum.repos.d/epel.repo
        insertafter: '^\[epel\]'
        line: "excludepkgs=zabbix*"
        regexp: "^excludepkgs=zabbix"
        state: present

    - name: Install Zabbix Agent from official repo
      ansible.builtin.dnf:
        name: zabbix-agent
        state: present

    - name: Install firewalld
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Ensure firewalld is running
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open port 9193/tcp (permanent)
      ansible.posix.firewalld:
        port: 9193/tcp
        permanent: true
        state: enabled

    - name: Open ports 6160-6162/tcp (permanent)
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        state: enabled
      loop:
        - 6160
        - 6161
        - 6162

    - name: Open Zabbix Agent port 10050/tcp in public zone (permanent)
      ansible.posix.firewalld:
        port: 10050/tcp
        zone: public
        permanent: true
        state: enabled

    - name: Reload firewalld
      ansible.builtin.service:
        name: firewalld
        state: reloaded


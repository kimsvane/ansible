---
  - name: Register Linux Proxy in Veeam Backup for Microsoft 365
    hosts: controller 
    gather_facts: no
    become: no

    tasks:
    - name: Add proxy and pool
      ansible.windows.win_powershell:
        script: |
          Import-Module Veeam.Archiver.PowerShell

          $proxyHostname = "{{ proxy_fqdn }}"
          $poolName      = "{{ proxy_pool_name }}"
          $pUser = "{{ proxy_username }}"
          $pPass = ConvertTo-SecureString -String "{{ proxy_password }}" -AsPlainText -Force
          $LinuxCred = New-VBOLinuxCredential -Account $pUser -ElevateAccountToRoot:$true -Password $pPass

          $proxy = Get-VBOProxy | Where-Object { $_.Hostname -eq $proxyHostname }
          if (!$proxy) {
              $proxy = Add-VBOProxy -Hostname $proxyHostname -Port {{ proxy_port }} -LinuxCredential $LinuxCred -Force
              Write-Host "Proxy $proxyHostname added."
          } else {
              Write-Host "Proxy $proxyHostname already exists."
          }

          # Opret pool hvis den ikke eksisterer
          $pool = Get-VBOProxyPool | Where-Object { $_.Name -eq $poolName }
          if (!$pool) {
              $pool = Add-VBOProxyPool -Name $poolName -Proxies $proxy
              Write-Host "Pool $poolName created with proxy $proxyHostname."
          } else {
              
              $memberExists = $pool.Proxies | Where-Object { $_.Hostname -eq $proxyHostname }
              if (!$memberExists) {
                  $updatedProxies = @($pool.Proxies) + $proxy
                  Set-VBOProxyPool -Pool $pool -Proxies $updatedProxies
                  Write-Host "Proxy $proxyHostname added to pool $poolName."
              } else {
                  Write-Host "Proxy $proxyHostname is already a member of pool $poolName."
              }
          }
      register: add_proxy_result

    - name: Result of adding proxy
      ansible.builtin.debug:
        var: add_proxy_result.host_out
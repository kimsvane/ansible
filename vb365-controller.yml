- name: VB365 v8.2 Download and Installation
  hosts: all
  vars:
    vb365_version: "8.2.0.2202"
    vb365_iso_url: "https://download2.veeam.com/VBO/v8/VeeamBackupMicrosoft365_8.2.0.2202.iso"
    vb365_iso_filename: "VeeamBackupMicrosoft365_8.2.0.2202.iso"
    vb365_iso_path: "C:\\{{ vb365_iso_filename }}"
    temp_dir: 'C:\Temp'
    sidecar_install_dir: 'C:\Program Files\Graylog\sidecar'
    graylog_sidecar_version: "1.5.2"
    graylog_sidecar_installer: "graylog-sidecar-{{ graylog_sidecar_version }}-1.msi"
    graylog_sidecar_url: "https://github.com/Graylog2/collector-sidecar/releases/download/{{ graylog_sidecar_version }}/{{ graylog_sidecar_installer }}"
    vb365_temp_folder:     "G:\\RestoreCache"
    vb365_retention_weeks: 52
    vb365_config_file:     "C:\\ProgramData\\Veeam\\Backup365\\Config.xml"

    # Disse variabler forventes fra Terraform-genereret fil
    # postgres_host: "{{ postgres_host }}"
    # postgres_port: "{{ postgres_port | default(5432) }}"
    # postgres_database: "{{ postgres_database }}"
    # postgres_user: "{{ postgres_user }}"
    # postgres_password: "{{ postgres_password }}"
    # nats_host: "{{ nats_host }}"
    # nats_port: "{{ nats_port | default(4222) }}"
  collections:
    - community.windows
    - ansible.windows
    - microsoft.ad
  tasks:
    - name: Set timezone to GMT Standard Time
      ansible.windows.win_timezone:
        timezone: GMT Standard Time



    - name: Configure MaxUserPort registry setting
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters
        name: MaxUserPort
        data: 65000
        type: dword

    - name: Configure TcpTimedWaitDelay registry setting
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters
        name: TcpTimedWaitDelay
        data: 30
        type: dword

 
    - name: Configure DNS client settings (PowerShell alternative)
      ansible.windows.win_shell: |
            # Find the adapter that is currently connected (e.g., has an IP address)
            $adapter = Get-NetAdapter | Where-Object { $_.Status -eq "Up" -and $_.LinkSpeed -ne "" } | Select-Object -First 1
            
            # Hvis adapteren findes, sæt DNS-serverne
            if ($adapter) {
                Set-DnsClientServerAddress -InterfaceAlias $adapter.Name -ServerAddresses ("{{ network_address }}.201", "{{ network_address }}.202")
                Write-Host "Successfully set DNS for adapter $($adapter.Name)"
            } else {
                Write-Host "No active network adapter found to set DNS."
            }

    - name: Join domain
      microsoft.ad.membership:
        dns_domain_name: "{{ domain }}"
        domain_admin_user: "{{ domain_user }}@{{ domain }}"
        domain_admin_password: "{{ domain_user_password }}"
        #domain_server: "{{ domain_controller }}"
        state: domain
      register: domain_state

    - name: Display domain join result
      ansible.builtin.debug:
        var: domain_state

    - name: Configure firewall - Remote Desktop (3389)
      community.windows.win_firewall_rule:
        name: Remote Desktop
        localport: 3389
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    - name: Configure firewall - Controller Communication (9193)
      community.windows.win_firewall_rule:
        name: Controller Communication 9193
        localport: 9193
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    - name: Configure firewall - SMB (445)
      community.windows.win_firewall_rule:
        name: Controller Communication 445
        localport: 445
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    - name: Configure firewall - Controller Communication (9194)
      community.windows.win_firewall_rule:
        name: Controller Communication 9194
        localport: 9194
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    - name: Configure firewall - HTTPS (4443)
      community.windows.win_firewall_rule:
        name: Controller Communication 4443
        localport: 4443
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    - name: Configure firewall - PostgreSQL (5432)
      community.windows.win_firewall_rule:
        name: PostgreSQL
        localport: 5432
        action: allow
        direction: out
        protocol: tcp
        state: present
        enabled: yes
      when: postgres_host is defined

    - name: Configure firewall - NATS (4222)
      community.windows.win_firewall_rule:
        name: NATS
        localport: 4222
        action: allow
        direction: out
        protocol: tcp
        state: present
        enabled: yes
      when: nats_host is defined


    - name: Download VB365 v8.2 installer
      ansible.windows.win_get_url:
        url: "{{ vb365_iso_url }}"
        dest: "{{ vb365_iso_path }}"
        timeout: 3600
      register: download_result

    - name: Display mount path for debugging
      ansible.builtin.debug:
        var: disk_image_out.mount_paths[0]

    - name: Tjek PostgreSQL forbindelse
      ansible.windows.win_shell: |
        Test-NetConnection -ComputerName {{ postgresql.postgres_host }} -Port {{ postgresql.postgres_port | default(6432) }}
      register: pg_check

    - name: Tjek NATS forbindelse  
      ansible.windows.win_shell: |
        Test-NetConnection -ComputerName {{ nats.host }} -Port {{ nats.port | default(4222) }}
      register: nats_check

##################################################


    - name: Check if reboot is required
      ansible.windows.win_shell: |
        $reboot = $false

        if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending") {
          $reboot = $true
        }

        $pfro = (Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager" -ErrorAction SilentlyContinue).PendingFileRenameOperations
        if ($pfro) { $reboot = $true }

        if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired") {
          $reboot = $true
        }

        if ($reboot) { "true" } else { "false" }
      register: reboot_check

    - name: Display reboot status
      debug:
        msg: "Reboot required: {{ reboot_check.stdout | trim }}"

    - name: Reboot if required
      ansible.windows.win_reboot:
        reboot_timeout: 1200
        post_reboot_delay: 900
        test_command: whoami
      when: reboot_check.stdout | trim == "true"

    - name: Mount VB365 ISO
      community.windows.win_disk_image:
        image_path: "{{ vb365_iso_path }}"
        state: present
      register: disk_image_out

    - name: Set redistributables path
      ansible.builtin.set_fact:
        redistr_path: "{{ disk_image_out.mount_paths[0] }}Redistr"

    - name: Install .NET Runtime
      ansible.windows.win_package:
        path: "{{ redistr_path }}\\dotnet-runtime-8.0.17-win-x64.exe"
        arguments: "/install /quiet /norestart"
        state: present
      async: 1800
      poll: 30

    - name: Install ASP.NET Runtime
      ansible.windows.win_package:
        path: "{{ redistr_path }}\\aspnetcore-runtime-8.0.17-win-x64.exe"
        arguments: "/quiet /norestart"
        state: present
      async: 1800
      poll: 30

    - name: Install Desktop Runtime
      ansible.windows.win_package:
        path: "{{ redistr_path }}\\windowsdesktop-runtime-8.0.17-win-x64.exe"
        arguments: "/quiet /norestart"
        state: present
      async: 1800
      poll: 30


    - name: Check VC++ Runtime
      ansible.windows.win_reg_stat:
        path: HKLM:\SOFTWARE\Microsoft\VisualStudio\14.0\VC\Runtimes\x64
        name: Installed
      register: vcredist_installed


    - name: Install VC++ Runtime
      ansible.windows.win_package:
        path: "{{ redistr_path }}\\VC_redist.x64.exe"
        arguments: /quiet /norestart
        state: present
      async: 1800
      poll: 30
      when: vcredist_installed.value != 1


    - name: Install PowerShell 7
      ansible.windows.win_package:
        path: "{{ redistr_path }}\\PowerShell-7.4.2-win-x64.msi"
        arguments: "/qn ADD_EXPLORER_CONTEXT_MENU_OPENPOWERSHELL=1 ENABLE_PSREMOTING=1"
        state: present
      async: 1800
      poll: 30

    - name: Wait for host after prereqs
      ansible.builtin.wait_for_connection:
        delay: 15
        sleep: 10
        timeout: 600


    - name: Check if reboot required after prereqs
      ansible.windows.win_shell: |
        if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending") { "true" } else { "false" }
      register: prereq_reboot

    - name: Reboot after prereqs if needed
      ansible.windows.win_reboot:
        reboot_timeout: 1200
      when: prereq_reboot.stdout | trim == "true"


    - name: Install VB365 v8.2 with external PostgreSQL and NATS
      ansible.windows.win_package:
        path: "{{ disk_image_out.mount_paths[0] }}Backup\\Veeam.Backup365.msi"
        arguments: >-
          ADDLOCAL=BR_OFFICE365,CONSOLE_OFFICE365,PS_OFFICE365,REST_OFFICE365 ACCEPT_THIRDPARTY_LICENSES=1 ACCEPT_EULA=1 CONNECTION="Host={{ postgresql.postgres_host }};Port={{ postgresql.postgres_port | default(6432) }};Database={{ postgresql.postgres_database }};Username={{ postgresql.postgres_user }};Password={{ postgresql.postgres_password }}" JETSTREAM_CONNECTION="nats://{{ nats.username }}:{{ nats.password }}@{{ nats.host }}:{{ nats.port | default(4222) }}"
        state: present
        log_path: C:\veeam_install_log.log
      async: 3600
      poll: 30
      register: install_result

    - name: Hent Veeam install log ved fejl
      ansible.windows.win_shell: Get-Content C:\veeam_install_log.log | Select-String "error|fail|Return value 3" -CaseSensitive:$false
      when: install_result is failed
      ignore_errors: true

    - name: Display installation result
      ansible.builtin.debug:
        var: install_result

    - name: Unmount ISO
      community.windows.win_disk_image:
        image_path: "{{ vb365_iso_path }}"
        state: absent

    - name: "Temp-mappe | Opret {{ vb365_temp_folder }}"
      ansible.windows.win_file:
        path: "{{ vb365_temp_folder }}"
        state: directory

    - name: "Temp-mappe | Sæt VB365 til at bruge {{ vb365_temp_folder }}"
      ansible.windows.win_powershell:
        script: |
          Import-Module Veeam.Archiver.PowerShell -ErrorAction Stop
          $current = (Get-VBOServer).TempFolderPath
          if ($current -ne "{{ vb365_temp_folder }}") {
              Set-VBOServer -TempFolderPath "{{ vb365_temp_folder }}"
              Write-Output "CHANGED"
          } else {
              Write-Output "OK"
          }
      register: result_temp
      changed_when: "'CHANGED' in (result_temp.output | join(''))"

    # ── 2. Session history retention: 52 uger ──────────────
    # Cmdlet: Set-VBOHistorySettings -KeepOnlyLastXweeks
    # Ref: helpcenter.veeam.com/docs/vbo365/powershell/set-vbohistorysettings.html
    - name: "Retention | Sæt job session history til {{ vb365_retention_weeks }} uger"
      ansible.windows.win_powershell:
        script: |
          Import-Module Veeam.Archiver.PowerShell -ErrorAction Stop
          $current = (Get-VBOHistorySettings).KeepOnlyLastXweeks
          if ($current -ne {{ vb365_retention_weeks }}) {
              Set-VBOHistorySettings -KeepOnlyLastXweeks {{ vb365_retention_weeks }}
              Write-Output "CHANGED"
          } else {
              Write-Output "OK"
          }
      register: result_retention
      changed_when: "'CHANGED' in (result_retention.output | join(''))"

    # ── 3. WCF OperationTimeout i Archiver-config ──────────
    - name: "Config | Tag backup af konfigurationsfilen"
      ansible.windows.win_copy:
        src: "{{ vb365_config_file }}"
        dest: "{{ vb365_config_file }}.bak_{{ ansible_date_time.date }}"
        remote_src: true

    - name: "Config | Indsæt <WCF OperationTimeout='2400' /> i Archiver-sektionen"
      ansible.windows.win_powershell:
        script: |
          $configPath = "{{ vb365_config_file }}"
          [xml]$config = Get-Content $configPath -Encoding UTF8

          $archiverNode = $config.SelectSingleNode("//Archiver")
          if ($null -eq $archiverNode) {
              $archiverNode = $config.CreateElement("Archiver")
              $config.DocumentElement.AppendChild($archiverNode) | Out-Null
          }

          $wcfNode = $archiverNode.SelectSingleNode("WCF")
          if ($null -eq $wcfNode) {
              $wcf = $config.CreateElement("WCF")
              $wcf.SetAttribute("OperationTimeout", "2400")
              $archiverNode.AppendChild($wcf) | Out-Null
              $config.Save($configPath)
              Write-Output "CHANGED"
          } elseif ($wcfNode.GetAttribute("OperationTimeout") -ne "2400") {
              $wcfNode.SetAttribute("OperationTimeout", "2400")
              $config.Save($configPath)
              Write-Output "CHANGED"
          } else {
              Write-Output "OK"
          }
      register: result_wcf
      changed_when: "'CHANGED' in (result_wcf.output | join(''))"

    # ── 4. Genstart service hvis config blev ændret ────────
    - name: "Service | Genstart Veeam Archiver Service"
      ansible.windows.win_service:
        name: "Veeam.Archiver.Service"
        state: restarted
      when: result_wcf.changed

  # ──────────────────────────────────────────────────────────
  # POST-TASKS: Verificering
  # ──────────────────────────────────────────────────────────
  post_tasks:
    - name: "Verificer | Vis aktuel VB365 konfiguration"
      ansible.windows.win_powershell:
        script: |
          Import-Module Veeam.Archiver.PowerShell -ErrorAction Stop
          Write-Output "TempFolder        : $((Get-VBOServer).TempFolderPath)"
          Write-Output "Session retention : $((Get-VBOHistorySettings).KeepOnlyLastXweeks) uger"
      register: verify_output

    - name: "Verificer | Udskriv status"
      ansible.builtin.debug:
        msg: "{{ verify_output.output }}"
    - name: Ensure temp directory exists
      ansible.windows.win_file:
        path: "{{ temp_dir }}"
        state: directory

    - name: Download Graylog Sidecar installer
      ansible.windows.win_get_url:
        url: "{{ graylog_sidecar_url }}"
        dest: "{{ temp_dir }}\\{{ graylog_sidecar_installer }}"
        force: false

    - name: Install Graylog Sidecar (silent)
      ansible.windows.win_package:
        path: "{{ temp_dir }}\\{{ graylog_sidecar_installer }}"
        arguments: "/quiet SERVERURL={{ graylog_server_url }} APITOKEN={{ graylog_api_token }}"
        state: present
        creates_path: "{{ sidecar_install_dir }}\\graylog-sidecar.exe"


    - name: Set node_name and node_id to server FQDN in sidecar.yml
      ansible.windows.win_powershell:
        script: |
          $configPath = "{{ sidecar_install_dir }}\sidecar.yml"
          $fqdn = "{{ ansible_fqdn }}"
          $content = Get-Content $configPath -Raw

          $content = $content -replace '(?m)^node_name:.*$', "node_name: `"$fqdn`""
          $content = $content -replace '(?m)^node_id:.*$',   "node_id: `"$fqdn`""

          Set-Content -Path $configPath -Value $content -Encoding UTF8
          Write-Output "CHANGED: node_name og node_id sat til $fqdn"
      changed_when: true

    - name: Check if Graylog Sidecar service already exists
      ansible.windows.win_service_info:
        name: graylog-sidecar
      register: sidecar_service_info

    - name: Install Graylog Sidecar as Windows service
      # creates: virker kun på filsystem-stier, ikke registry – tjekkes via win_service_info i stedet
      ansible.windows.win_command:
        cmd: '"{{ sidecar_install_dir }}\graylog-sidecar.exe" -service install'
      when: not sidecar_service_info.exists

    # - name: Ensure Graylog Sidecar service is running and set to auto-start
    #   ansible.windows.win_service:
    #     name: graylog-sidecar
    #     state: started
    #     start_mode: auto

    - name: Allow Graylog Sidecar through Windows Firewall (outbound)
      community.windows.win_firewall_rule:
        name: "Graylog Sidecar Outbound"
        direction: out
        protocol: tcp
        program: "{{ sidecar_install_dir }}\\graylog-sidecar.exe"
        action: allow
        state: present
        enabled: true

    - name: Cleanup installer
      ansible.windows.win_file:
        path: "{{ temp_dir }}\\{{ graylog_sidecar_installer }}"
        state: absent
    
    - name: "Utility mappe | create D:\\Utility "
      ansible.windows.win_file:
        path: "D:\\Utility"
        state: directory

    - name: Download tools
      ansible.windows.win_get_url:
        url: "{{ item.url }}"
        dest: "D:\\Utility\\{{ item.file }}"
        # Vi sætter force: true midlertidigt for at overskrive de potentielt ødelagte filer
        force: true 
      loop:
        # Bemærk: Jeg har opdateret WinSCP linket til deres officielle statiske download
        - { url: "https://master.dl.sourceforge.net/project/winscp/WinSCP/6.3.2/WinSCP-6.3.2-Portable.zip", file: "WinSCP.zip" }
        - { url: "https://download.sysinternals.com/files/ProcessExplorer.zip", file: "ProcessExplorer.zip" }
        - { url: "https://files.budman.pw/?file=iperf3.1.4_64.zip", file: "iperf3.zip" }

    - name: extract tools
      community.windows.win_unzip:
        src: "D:\\Utility\\{{ item.file }}"
        dest: "D:\\Utility\\{{ item.folder }}"
        delete_archive: yes
      loop:
        - { file: "WinSCP.zip", folder: "WinSCP" }
        - { file: "ProcessExplorer.zip", folder: "ProcessExplorer" }
        - { file: "iperf3.zip", folder: "iPerf3" }

    - name: Reboot server after installation
      ansible.windows.win_reboot:
        reboot_timeout: 600
